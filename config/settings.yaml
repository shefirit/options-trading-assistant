# ============================================================
#  Global settings - your account, targets, and risk limits.
#  Edit these numbers as your plan changes. Everything in the
#  app reads from this file, so you never touch the code.
# ============================================================

account:
  starting_capital: 100000      # dollars you began with
  platform: "thinkorswim PaperMoney"

# Your income goals (from your Notion hub).
targets:
  weekly: 808
  monthly: 3500
  year_one_end_balance: 142000

# Hard risk limits the app will warn you about.
risk_limits:
  monthly_bp_limit: 50000       # do not use more than this in buying power per month
  position_delta_red_flag: 90   # if a position's net delta passes this, it is a red flag

# The "Picks" tab's market screen - the bar a name must clear before the app
# spends an option-chain fetch on it. Your bar: credible, LARGE, liquid.
picks:
  min_dollar_volume: 200000000  # avg dollars traded per day - thin names have costly option spreads
  min_market_cap: 10000000000   # stocks only: at least $10B - large companies only
  min_price: 15                 # skip junk-priced names (assignment traps)
  hv_min: 0.12                  # calmer than 12%/yr pays too little premium to bother
  hv_max: 0.80                  # wilder than 80%/yr is "great premium, great danger"
  max_stock_finalists: 20       # how many stocks get the full option-chain analysis
  max_etf_finalists: 10         # how many ETFs get it
  # The Quick scan (no whole-market screen): the 4 indexes are always included,
  # plus this many of the biggest ETFs (by assets) and biggest stocks (by market
  # cap). Raise these for a wider quick scan, lower them for a faster one.
  quick_top_etfs: 15
  quick_top_stocks: 20
  # A downtrending stock only gets a bearish Call Credit Spread if it is this big
  # (top N by market cap) AND grade A/B - single-stock bear spreads need a
  # rock-solid name. Lower this to be stricter about which fallers qualify.
  bearish_top_stocks: 20

# Underlyings the app is allowed to scan, grouped by option style.
# European-style = cash settled, no early assignment (good for credit spreads).
# US-style = you can be assigned early; you must own 100 real shares for covered calls.
underlyings:
  european_style:               # for credit spreads / iron condors
    - SPX      # S&P 500 - your usual go-to (just an example, not the only choice)
    - NDX      # Nasdaq 100
    - RUT      # Russell 2000
    - XSP      # Mini S&P 500 (smaller version of SPX)
  us_style:                     # ETFs for covered calls, PMCC, cash secured puts
    - SPY      # S&P 500
    - QQQ      # Nasdaq 100
    - IWM      # Russell 2000
    - DIA      # Dow 30
    # High-liquidity additions (non-leveraged, beginner-appropriate):
    - GLD      # Gold
    - SLV      # Silver
    - TLT      # 20-year Treasuries (bonds)
    - EEM      # Emerging markets
    - EFA      # Developed international
    - XLF      # Financials sector
    - XLE      # Energy sector
    - XLK      # Technology sector
    - XLV      # Healthcare sector
    - SMH      # Semiconductors
  # Default list the "Premium finder" compares (you can change it in the app).
  # A mix of calm ETFs and livelier stocks so you can see the premium range.
  premium_watchlist:
    - SPY
    - QQQ
    - IWM
    - AAPL
    - MSFT
    - NVDA
    - AMD
    - TSLA
    - AMZN
    - META
    - GOOGL
    - AVGO

  # Quality, liquid, big-volume stocks with solid fundamentals and deep options
  # markets. Used for cash secured puts, covered calls, and PMCC (US-style).
  # These are examples of strong, well-known companies - not trade advice.
  stocks:
    - AAPL   # Apple
    - MSFT   # Microsoft
    - NVDA   # Nvidia
    - AMZN   # Amazon
    - GOOGL  # Alphabet (Google)
    - META   # Meta
    - AVGO   # Broadcom
    - JPM    # JPMorgan
    - V      # Visa
    - COST   # Costco
    - HD     # Home Depot
    - WMT    # Walmart
    - KO     # Coca-Cola
    - PG     # Procter & Gamble
    - JNJ    # Johnson & Johnson

# The Notion hub this app mirrors.
notion:
  hub_url: "https://app.notion.com/p/38803e90e032812d8958c92992c269ed"

# Your Google Sheet trade log. The "Log this trade" button writes here once you
# finish the one-time setup in src/logging_tools/sheets_logger.py. Until then it
# saves to a local backup file automatically.
google_sheet:
  enabled: true
  spreadsheet_id: "1soKk5HrlYQqNJi98fBVWYDGSPhCIGUMrK8RyI8yW5RA"
  worksheet_gid: 2063471337
  credentials_file: "google_credentials.json"   # you place this file in the project folder
