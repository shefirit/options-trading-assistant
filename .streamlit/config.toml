# Modern, clean design system. Cool near-white canvas, white cards,
# slate ink text, and a single indigo accent. High contrast for accessibility.
[theme]
base = "light"
primaryColor = "#4F46E5"              # indigo accent - buttons, slider, focus
backgroundColor = "#F8F9FC"           # cool near-white canvas
secondaryBackgroundColor = "#FFFFFF"  # cards, sidebar, inputs
textColor = "#0F172A"                 # slate ink - very high contrast
font = "sans serif"

# Note: no [server] settings here on purpose. The hosted app needs to run
# headless (no browser on the server), and run_app.bat opens the browser
# locally via command-line flags instead. Forcing headless=false here breaks
# the cloud server.
