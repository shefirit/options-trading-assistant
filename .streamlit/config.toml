# "Fresh Growth" design system: soft green canvas, white cards, emerald accent,
# near-black high-contrast text. Tuned for WCAG AA readability.
[theme]
base = "light"
primaryColor = "#0B7A54"              # emerald accent - buttons, slider, tags, focus
backgroundColor = "#F2F9F5"           # soft green-tinted canvas
secondaryBackgroundColor = "#FFFFFF"  # cards, sidebar, inputs
textColor = "#0B1F16"                 # near-black green ink - very high contrast
font = "sans serif"

# Note: no [server] settings here on purpose. The hosted app needs to run
# headless (no browser on the server), and run_app.bat opens the browser
# locally via command-line flags instead. Forcing headless=false here breaks
# the cloud server.
